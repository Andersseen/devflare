name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  actions: read
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

jobs:
  main:
    name: Nx Cloud - Main Job
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install pnpm (pinned version, compatible with Node 20/22)
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Verify lockfile is up to date
      - name: Check lockfile
        run: git diff --exit-code pnpm-lock.yaml || (echo "Lockfile is out of date. Run 'pnpm install' locally." && exit 1)

      # Install Playwright browsers
      - run: pnpm exec playwright install --with-deps chromium

      # Nx set SHAs for affected commands
      - uses: nrwl/nx-set-shas@v4

      # Run all checks in order: format → lint → typecheck → test → build → e2e
      - name: Format Check
        run: pnpm format:check

      - name: Lint
        run: pnpm nx run-many -t lint --parallel=3

      - name: Type Check
        run: pnpm nx run-many -t typecheck --parallel=3

      - name: Unit Tests
        run: pnpm nx run-many -t test --parallel=3 --coverage

      - name: Build
        run: pnpm nx run-many -t build --parallel=3

      - name: E2E Tests
        run: pnpm nx run-many -t e2e --parallel=1

      # Upload coverage reports
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          directory: ./coverage
          fail_ci_if_error: false
          verbose: true
